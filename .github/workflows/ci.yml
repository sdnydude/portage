name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck shared
        run: npm run typecheck -w packages/shared

      - name: Typecheck API
        run: npm run typecheck -w apps/api

      - name: Typecheck web
        run: npm run typecheck -w apps/web

      - name: Lint web
        run: npm run lint -w apps/web

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-typecheck

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: portage
          POSTGRES_PASSWORD: portage
          POSTGRES_DB: portage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portage"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run API tests
        run: npm run test:api
        env:
          DATABASE_URL: postgresql://portage:portage@localhost:5432/portage
          JWT_SECRET: ci-test-secret-that-is-at-least-32-chars
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build all
        run: npm run build
