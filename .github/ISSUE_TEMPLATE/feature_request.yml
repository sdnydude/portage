name: Feature Request
description: Suggest a new feature for Portage
labels: [enhancement]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem does this solve? How would you use it?
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Inventory
        - Listings
        - Orders
        - Porter AI
        - Admin Panel
        - Marketplace
        - Other
    validations:
      required: true
